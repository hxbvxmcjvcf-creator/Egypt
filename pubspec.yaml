name: edu_auth
description: Advanced Authentication System - Educational Platform (Firebase Edition)
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase — pinned compatible set
  firebase_core:    ^3.6.0
  firebase_auth:    ^5.3.1
  cloud_firestore:  ^5.4.4

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Dependency Injection
  get_it: ^7.6.7

  # Secure Storage (web-safe)
  flutter_secure_storage: ^9.2.2

  # Local Cache
  shared_preferences: ^2.3.2

  # Networking
  dio: ^5.7.0

  # Functional Programming
  dartz: ^0.10.1

  # Utilities
  uuid:      ^4.5.1
  crypto:    ^3.0.3
  intl:      ^0.19.0
  equatable: ^2.0.5

  # UI & Animation
  flutter_animate: ^4.5.0
  google_fonts:    ^6.2.1
  pinput:          ^3.0.1

  # Logging
  logger: ^2.4.0

  # Device & Connectivity
  device_info_plus:    ^10.1.2
  connectivity_plus:   ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:  ^4.0.0
  mockito:        ^5.4.4
  build_runner:   ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  generate: true
